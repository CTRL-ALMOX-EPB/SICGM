<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICGM - Contagem Diária</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <!-- ============================================ -->
    <!-- BOTÃO IR PARA O TOPO (FIXO NO CANTO)        -->
    <!-- ============================================ -->
    <button id="btnTopo" class="btn-navegacao btn-topo" onclick="irParaTopo()" title="Ir para o topo">
        <span class="btn-navegacao-icone">⬆</span>
        <span class="btn-navegacao-texto">Topo</span>
    </button>

    <!-- ============================================ -->
    <!-- BOTÃO IR PARA O FIM (FIXO NO CANTO)         -->
    <!-- ============================================ -->
    <button id="btnFim" class="btn-navegacao btn-fim" onclick="irParaFim()" title="Ir para o fim da página">
        <span class="btn-navegacao-icone">⬇</span>
        <span class="btn-navegacao-texto">Fim</span>
    </button>

    <div class="container">
        <div class="form-card">
            
            <!-- Logo e Título -->
            <div class="header-container">
                <img src="../assets/img/logo-control.png" alt="Logo SITA" class="logo-empresa">
                <h1 class="title">SICGM - Contagem Diária</h1>
            </div>
            
            <!-- Botão Voltar ao Início Baseado no Perfil -->
            <div style="display: flex; justify-content: flex-start; margin-bottom: 20px;">
                <button onclick="redirecionarParaHome()" style="
                    background: #4299E1;
                    color: white;
                    border: none;
                    padding: 10px 25px;
                    border-radius: 8px;
                    cursor: pointer;
                    font-weight: 600;
                    font-size: 14px;
                    transition: all 0.3s ease;
                    display: inline-flex;
                    align-items: center;
                    gap: 8px;
                " onmouseover="this.style.background='#3182CE'; this.style.transform='translateY(-2px)'" onmouseout="this.style.background='#4299E1'; this.style.transform='translateY(0)'">
                    🏠 Voltar ao Início
                </button>
            </div>
            
            <form id="contagemForm">
                
                <!-- Nome, Matrícula e Data lado a lado -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="nome">Nome *</label>
                        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required readonly>
                    </div>

                    <div class="form-group">
                        <label for="matricula">Matrícula *</label>
                        <input type="text" id="matricula" name="matricula" placeholder="Digite sua matrícula" required readonly>
                    </div>

                    <div class="data-field">
                        <label for="data">Data</label>
                        <input type="date" id="data" name="data" readonly>
                    </div>
                </div>

                <!-- Seção de Materiais -->
                <div class="materiais-section">
                    <h2 class="section-title">Materiais</h2>
                    
                    <!-- FILTRO DE PESQUISA -->
                    <div class="filtro-container">
                        <div class="filtro-row">
                            <div class="filtro-input-group">
                                <label for="filtro-texto">🔍 Pesquisar</label>
                                <input type="text" id="filtro-texto" placeholder="Digite para pesquisar..." oninput="aplicarFiltro()">
                            </div>
                            <div class="filtro-select-group">
                                <label for="filtro-tipo">Filtrar por</label>
                                <select id="filtro-tipo" onchange="aplicarFiltro()">
                                    <option value="codigo">Código</option>
                                    <option value="descricao">Descrição</option>
                                    <option value="tombamento">Tombamento</option>
                                    <option value="todos">Todos os campos</option>
                                </select>
                            </div>
                            <div class="filtro-clear-group">
                                <button type="button" class="btn-limpar-filtro" onclick="limparFiltro()">
                                    ✕ Limpar
                                </button>
                            </div>
                        </div>
                        <div id="filtro-resultado" class="filtro-resultado">
                            <span id="filtro-contagem">Mostrando 0 itens</span>
                        </div>
                    </div>
                    
                    <!-- Sistema de Abas -->
                    <div class="tabs-container">
                        <div class="tabs-nav" id="tabs-nav"></div>
                        <div id="tabs-content"></div>
                    </div>
                    
                    <div id="loading-materiais" style="text-align: center; padding: 20px; color: #718096;">
                        ⏳ Carregando materiais...
                    </div>
                    
                    <div id="mensagem" class="mensagem"></div>
                </div>

                <button type="submit" class="submit-btn">📝 Registrar Contagem</button>
            </form>
            
        </div>
        
        <!-- Rodapé com link de voltar (fallback) -->
        <div style="text-align: center; margin-top: 1rem;">
            <button onclick="redirecionarParaHome()" style="
                background: transparent;
                color: #4299E1;
                border: none;
                cursor: pointer;
                font-weight: 500;
                font-size: 14px;
                text-decoration: underline;
            ">
                ← Voltar para Home
            </button>
        </div>
    </div>

    <!-- Pop-up para descrição completa -->
    <div id="descricao-popup" class="descricao-popup"></div>
    <div id="popup-overlay" class="popup-overlay"></div>

    <!-- Importar apenas o contagem-diaria.js (NÃO importar script.js) -->
    <script src="../js/contagem-diaria.js"></script>
</body>
</html>
