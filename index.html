<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SICGM</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-container">
                <img src="assets/img/logo-control.png" alt="Logo da Empresa" class="logo">
            </div>
            <h2>SICGM - Sistema de Gestão</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="matricula">Matrícula:</label>
                    <input type="text" id="matricula" placeholder="Digite sua matrícula" required autofocus>
                </div>
                <div class="input-group">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" placeholder="Digite os 4 primeiros dígitos do CPF" required>
                </div>
                <div id="mensagemErro" class="mensagem-erro"></div>
                <button type="submit" class="btn-login">Login</button>
            </form>
            <div class="login-footer">
                <span>Sistema interno - Acesso restrito</span>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
