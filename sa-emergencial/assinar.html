<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Assinatura - S.A. Emergencial</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✍️</text></svg>">
    <link rel="stylesheet" href="../css/base.css">
    <style>
        /* ============================================ */
        /* ASSINATURA - PÁGINA DEDICADA                */
        /* ============================================ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            background: #1a237e;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        .assinatura-container {
            background: white;
            border-radius: 16px;
            max-width: 700px;
            width: 100%;
            max-height: 98vh;
            height: auto;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease;
            overflow: hidden;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .assinatura-header {
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            color: white;
            padding: 20px 25px;
            text-align: center;
            flex-shrink: 0;
        }

        .assinatura-header h1 {
            font-size: clamp(20px, 4vw, 28px);
            margin-bottom: 3px;
            font-weight: 600;
        }

        .assinatura-header p {
            opacity: 0.9;
            font-size: clamp(13px, 2vw, 16px);
        }

        .assinatura-body {
            padding: 20px 25px;
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .assinatura-info {
            background: #F7FAFC;
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            border: 1px solid #E2E8F0;
            flex-shrink: 0;
        }

        .assinatura-info .label {
            font-weight: 600;
            color: #1a237e;
            font-size: clamp(12px, 1.8vw, 14px);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .assinatura-info .nome {
            font-size: clamp(18px, 3.5vw, 22px);
            font-weight: 700;
            color: #2D3748;
            margin-top: 3px;
            word-break: break-word;
        }

        .assinatura-info .tipo {
            font-size: clamp(12px, 1.5vw, 14px);
            color: #718096;
            margin-top: 3px;
        }

        .form-group {
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            color: #4A5568;
            font-size: clamp(13px, 1.6vw, 14px);
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #E2E8F0;
            border-radius: 8px;
            font-size: clamp(14px, 2vw, 16px);
            transition: border-color 0.3s;
            background: #FFFFFF;
            -webkit-user-select: text;
            user-select: text;
            -webkit-touch-callout: text;
        }

        .form-group input:focus {
            border-color: #4299E1;
            outline: none;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        .signature-area {
            border: 2px solid #E2E8F0;
            border-radius: 10px;
            margin: 10px 0 15px;
            background: white;
            touch-action: none;
            overflow: hidden;
            flex: 1;
            min-height: 150px;
            position: relative;
        }

        .signature-area canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            min-height: 150px;
            touch-action: none;
            cursor: crosshair;
            position: absolute;
            top: 0;
            left: 0;
        }

        .signature-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            flex-shrink: 0;
            padding-top: 5px;
        }

        .signature-actions button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: clamp(13px, 1.6vw, 15px);
            transition: all 0.3s ease;
            flex: 1;
            min-width: 80px;
            touch-action: manipulation;
        }

        .btn-limpar {
            background: #ED8936;
            color: white;
        }

        .btn-limpar:hover {
            background: #DD6B20;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(237, 137, 54, 0.4);
        }

        .btn-confirmar {
            background: #48BB78;
            color: white;
        }

        .btn-confirmar:hover {
            background: #38A169;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(72, 187, 120, 0.4);
        }

        .btn-cancelar {
            background: #FC8181;
            color: white;
        }

        .btn-cancelar:hover {
            background: #F56565;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(252, 129, 129, 0.4);
        }

        .btn-voltar {
            background: #718096;
            color: white;
        }

        .btn-voltar:hover {
            background: #4A5568;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(113, 128, 150, 0.4);
        }

        .assinatura-status {
            text-align: center;
            padding: 8px 12px;
            margin-top: 10px;
            border-radius: 8px;
            display: none;
            font-size: clamp(13px, 1.5vw, 14px);
            flex-shrink: 0;
        }

        .assinatura-status.success {
            display: block;
            background: #F0FFF4;
            color: #276749;
            border: 1px solid #48BB78;
        }

        .assinatura-status.error {
            display: block;
            background: #FFF5F5;
            color: #C53030;
            border: 1px solid #FC8181;
        }

        /* ============================================ */
        /* RESPONSIVO - CORRIGIDO PARA ROTAÇÃO         */
        /* ============================================ */

        @media (max-width: 768px) {
            body {
                padding: 8px;
            }

            .assinatura-container {
                max-height: 99vh;
                border-radius: 12px;
            }

            .assinatura-header {
                padding: 15px 20px;
            }

            .assinatura-body {
                padding: 15px 20px;
            }

            .assinatura-info {
                padding: 10px 14px;
                margin-bottom: 12px;
            }

            .signature-area {
                min-height: 180px;
            }

            .signature-area canvas {
                min-height: 180px;
            }

            .signature-actions button {
                padding: 10px 16px;
                min-width: 70px;
            }
        }

        @media (max-width: 600px) {
            .signature-area {
                min-height: 200px;
            }

            .signature-area canvas {
                min-height: 200px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 5px;
            }

            .assinatura-header {
                padding: 12px 15px;
            }

            .assinatura-header h1 {
                font-size: 18px;
            }

            .assinatura-header p {
                font-size: 13px;
            }

            .assinatura-body {
                padding: 12px 15px;
            }

            .assinatura-info {
                padding: 8px 12px;
                margin-bottom: 10px;
            }

            .assinatura-info .nome {
                font-size: 16px;
            }

            .assinatura-info .label {
                font-size: 11px;
            }

            .signature-area {
                min-height: 160px;
                margin: 8px 0 12px;
            }

            .signature-area canvas {
                min-height: 160px;
            }

            .signature-actions {
                flex-direction: row;
                gap: 6px;
                flex-wrap: wrap;
            }

            .signature-actions button {
                padding: 10px 12px;
                font-size: 12px;
                min-width: 60px;
                flex: 1;
            }

            .form-group input {
                padding: 8px 12px;
                font-size: 14px;
            }
        }

        @media (max-width: 380px) {
            .signature-area {
                min-height: 130px;
            }

            .signature-area canvas {
                min-height: 130px;
            }

            .signature-actions button {
                font-size: 11px;
                padding: 8px 10px;
                min-width: 50px;
            }

            .assinatura-info .nome {
                font-size: 14px;
            }
        }

        /* Orientação paisagem em celular */
        @media (max-height: 500px) and (orientation: landscape) {
            .assinatura-container {
                max-height: 98vh;
                flex-direction: row;
                flex-wrap: wrap;
            }

            .assinatura-header {
                width: 100%;
                padding: 10px 15px;
            }

            .assinatura-header h1 {
                font-size: 16px;
            }

            .assinatura-header p {
                font-size: 12px;
            }

            .assinatura-body {
                width: 100%;
                padding: 10px 15px;
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                align-items: flex-start;
            }

            .assinatura-info {
                width: 100%;
                padding: 6px 12px;
                margin-bottom: 8px;
            }

            .assinatura-info .nome {
                font-size: 14px;
            }

            .assinatura-info .label {
                font-size: 10px;
            }

            .form-group {
                width: 100%;
                margin-bottom: 8px;
            }

            .form-group input {
                padding: 6px 10px;
                font-size: 13px;
            }

            .signature-area {
                width: 100%;
                min-height: 120px;
                margin: 5px 0 10px;
            }

            .signature-area canvas {
                min-height: 120px;
            }

            .signature-actions {
                width: 100%;
                gap: 5px;
            }

            .signature-actions button {
                padding: 8px 12px;
                font-size: 11px;
                min-width: 50px;
            }

            .assinatura-status {
                width: 100%;
                margin-top: 5px;
                padding: 5px 10px;
                font-size: 12px;
            }
        }

        /* Scrollbar personalizada */
        .assinatura-container::-webkit-scrollbar {
            width: 4px;
        }

        .assinatura-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .assinatura-container::-webkit-scrollbar-thumb {
            background: #1a237e;
            border-radius: 3px;
        }

        .assinatura-container::-webkit-scrollbar-thumb:hover {
            background: #0d47a1;
        }
    </style>
</head>
<body>
    <div class="assinatura-container" id="assinaturaContainer">
        <div class="assinatura-header">
            <h1>✍️ ASSINATURA</h1>
            <p>Assine no campo abaixo com o mouse ou dedo</p>
        </div>

        <div class="assinatura-body">
            <div class="assinatura-info">
                <div class="label" id="tipoAssinatura">ENTREGUE POR</div>
                <div class="nome" id="nomeSignatario">-</div>
                <div class="tipo" id="infoAdicional">S.A. Emergencial</div>
            </div>

            <div class="form-group">
                <label for="nomeInput">Nome do Signatário *</label>
                <input type="text" id="nomeInput" placeholder="Digite seu nome completo" autocomplete="off">
            </div>

            <div class="signature-area" id="signatureArea">
                <canvas id="signatureCanvas"></canvas>
            </div>

            <div class="assinatura-status" id="statusMessage"></div>

            <div class="signature-actions">
                <button class="btn-limpar" onclick="limparAssinatura()">🗑️ Limpar</button>
                <button class="btn-confirmar" onclick="confirmarAssinatura()">✅ Confirmar</button>
                <button class="btn-cancelar" onclick="cancelarAssinatura()">❌ Cancelar</button>
                <button class="btn-voltar" onclick="voltarSemAssinar()">⬅ Voltar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script>
        let signaturePad = null;
        let dadosAssinatura = null;
        let resizeTimeout = null;

        // ============================================
        // INICIALIZAÇÃO
        // ============================================

        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const tipo = params.get('tipo') || 'entregue';
            const nome = params.get('nome') || '';
            const numero = params.get('numero') || '';

            dadosAssinatura = {
                tipo: tipo,
                nome: nome,
                numero: numero
            };

            const tipoLabel = tipo === 'entregue' ? '📤 ENTREGUE POR' : '📥 RECEBIDO POR';
            document.getElementById('tipoAssinatura').textContent = tipoLabel;
            document.getElementById('nomeSignatario').textContent = nome || 'Aguardando...';
            document.getElementById('nomeInput').value = nome || '';
            document.getElementById('infoAdicional').textContent = `S.A. Emergencial #${String(numero).padStart(4, '0')}`;

            // Inicializar Signature Pad
            const canvas = document.getElementById('signatureCanvas');
            const container = document.getElementById('signatureArea');
            
            // Função para redimensionar o canvas
            function resizeCanvas() {
                if (!container || !canvas) return;
                
                const rect = container.getBoundingClientRect();
                const width = rect.width - 4;
                const height = Math.max(rect.height - 4, 150);
                
                const dpr = window.devicePixelRatio || 1;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                canvas.style.width = width + 'px';
                canvas.style.height = height + 'px';
                
                if (signaturePad) {
                    signaturePad.resizeCanvas();
                    signaturePad._ctx.scale(dpr, dpr);
                }
            }

            // Criar o Signature Pad
            signaturePad = new SignaturePad(canvas, {
                backgroundColor: 'rgba(255, 255, 255, 0)',
                penColor: '#1a237e',
                minWidth: 2,
                maxWidth: 4,
                throttle: 16
            });

            // Redimensionar inicial
            setTimeout(resizeCanvas, 100);

            // Redimensionar ao mudar orientação ou redimensionar
            const handleResize = function() {
                if (resizeTimeout) {
                    clearTimeout(resizeTimeout);
                }
                resizeTimeout = setTimeout(function() {
                    resizeCanvas();
                    resizeTimeout = null;
                }, 150);
            };

            window.addEventListener('resize', handleResize);
            window.addEventListener('orientationchange', function() {
                setTimeout(resizeCanvas, 300);
            });

            // Observer para mudanças de tamanho do container
            if (window.ResizeObserver) {
                const resizeObserver = new ResizeObserver(function() {
                    handleResize();
                });
                resizeObserver.observe(container);
            }

            // Enter para confirmar
            document.getElementById('nomeInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    confirmarAssinatura();
                }
            });

            // Prevenir scroll ao tocar no canvas
            canvas.addEventListener('touchstart', function(e) {
                e.preventDefault();
            }, { passive: false });

            // Ajustar ao focar no input (teclado sobe)
            document.getElementById('nomeInput').addEventListener('focus', function() {
                setTimeout(function() {
                    const container = document.querySelector('.assinatura-container');
                    container.scrollTop = container.scrollHeight;
                }, 300);
            });
        });

        // ============================================
        // FUNÇÕES DE ASSINATURA
        // ============================================

        function limparAssinatura() {
            if (signaturePad) {
                signaturePad.clear();
            }
            document.getElementById('statusMessage').className = 'assinatura-status';
            document.getElementById('statusMessage').style.display = 'none';
        }

        function confirmarAssinatura() {
            const nome = document.getElementById('nomeInput').value.trim();
            
            if (!nome) {
                mostrarStatus('⚠️ Por favor, informe o nome do signatário.', 'error');
                return;
            }

            if (!signaturePad || signaturePad.isEmpty()) {
                mostrarStatus('⚠️ Por favor, assine no campo acima.', 'error');
                return;
            }

            const assinaturaData = signaturePad.toDataURL();

            const dados = {
                tipo: dadosAssinatura.tipo,
                nome: nome,
                assinatura: assinaturaData,
                numero: dadosAssinatura.numero
            };

            sessionStorage.setItem('assinatura_temp', JSON.stringify(dados));

            mostrarStatus('✅ Assinatura realizada com sucesso! Redirecionando...', 'success');

            setTimeout(() => {
                window.location.href = 'formulario.html?numero=' + dadosAssinatura.numero;
            }, 1500);
        }

        function cancelarAssinatura() {
            if (confirm('❌ Tem certeza que deseja cancelar a assinatura?')) {
                window.location.href = 'formulario.html?numero=' + dadosAssinatura.numero;
            }
        }

        function voltarSemAssinar() {
            if (confirm('⚠️ Você vai voltar sem assinar. Tem certeza?')) {
                window.location.href = 'formulario.html?numero=' + dadosAssinatura.numero;
            }
        }

        function mostrarStatus(mensagem, tipo) {
            const status = document.getElementById('statusMessage');
            status.textContent = mensagem;
            status.className = 'assinatura-status ' + tipo;
            status.style.display = 'block';
        }
    </script>
</body>
</html>
