<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assinatura - S.A. Emergencial</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✍️</text></svg>">
    <link rel="stylesheet" href="../css/base.css">
    <style>
        /* ============================================ */
        /* ASSINATURA - PÁGINA DEDICADA                */
        /* ============================================ */

        body {
            background: #1a237e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .assinatura-container {
            background: white;
            border-radius: 16px;
            max-width: 700px;
            width: 100%;
            max-height: 95vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .assinatura-header {
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            color: white;
            padding: 25px 30px;
            border-radius: 16px 16px 0 0;
            text-align: center;
        }

        .assinatura-header h1 {
            font-size: 28px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .assinatura-header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .assinatura-body {
            padding: 30px;
        }

        .assinatura-info {
            background: #F7FAFC;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #E2E8F0;
        }

        .assinatura-info .label {
            font-weight: 600;
            color: #1a237e;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .assinatura-info .nome {
            font-size: 22px;
            font-weight: 700;
            color: #2D3748;
            margin-top: 5px;
        }

        .assinatura-info .tipo {
            font-size: 14px;
            color: #718096;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #4A5568;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E2E8F0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            background: #FFFFFF;
        }

        .form-group input:focus {
            border-color: #4299E1;
            outline: none;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        .signature-area {
            border: 2px solid #E2E8F0;
            border-radius: 10px;
            margin: 15px 0 20px;
            background: white;
            touch-action: none;
            overflow: hidden;
        }

        .signature-area canvas {
            display: block;
            width: 100%;
            height: 250px;
            touch-action: none;
            cursor: crosshair;
        }

        .signature-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .signature-actions button {
            padding: 14px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 120px;
        }

        .btn-limpar {
            background: #ED8936;
            color: white;
        }

        .btn-limpar:hover {
            background: #DD6B20;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(237, 137, 54, 0.4);
        }

        .btn-confirmar {
            background: #48BB78;
            color: white;
        }

        .btn-confirmar:hover {
            background: #38A169;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(72, 187, 120, 0.4);
        }

        .btn-cancelar {
            background: #FC8181;
            color: white;
        }

        .btn-cancelar:hover {
            background: #F56565;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(252, 129, 129, 0.4);
        }

        .btn-voltar {
            background: #718096;
            color: white;
        }

        .btn-voltar:hover {
            background: #4A5568;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(113, 128, 150, 0.4);
        }

        .assinatura-status {
            text-align: center;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            display: none;
        }

        .assinatura-status.success {
            display: block;
            background: #F0FFF4;
            color: #276749;
            border: 1px solid #48BB78;
        }

        .assinatura-status.error {
            display: block;
            background: #FFF5F5;
            color: #C53030;
            border: 1px solid #FC8181;
        }

        /* ============================================ */
        /* RESPONSIVO                                  */
        /* ============================================ */

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .assinatura-container {
                max-height: 98vh;
                border-radius: 12px;
            }

            .assinatura-header {
                padding: 20px;
            }

            .assinatura-header h1 {
                font-size: 22px;
            }

            .assinatura-body {
                padding: 20px;
            }

            .assinatura-info .nome {
                font-size: 18px;
            }

            .signature-area canvas {
                height: 200px;
            }

            .signature-actions button {
                padding: 12px 20px;
                font-size: 13px;
                min-width: 100px;
            }
        }

        @media (max-width: 480px) {
            .assinatura-header {
                padding: 15px;
            }

            .assinatura-header h1 {
                font-size: 18px;
            }

            .assinatura-header p {
                font-size: 14px;
            }

            .assinatura-body {
                padding: 15px;
            }

            .assinatura-info .nome {
                font-size: 16px;
            }

            .assinatura-info .label {
                font-size: 12px;
            }

            .signature-area canvas {
                height: 160px;
            }

            .signature-actions {
                flex-direction: column;
            }

            .signature-actions button {
                width: 100%;
                padding: 12px;
                font-size: 14px;
                min-width: unset;
            }

            .form-group input {
                font-size: 14px;
                padding: 10px 12px;
            }
        }

        @media (max-width: 360px) {
            .assinatura-header h1 {
                font-size: 16px;
            }

            .assinatura-body {
                padding: 12px;
            }

            .signature-area canvas {
                height: 130px;
            }

            .assinatura-info .nome {
                font-size: 14px;
            }
        }

        /* Scrollbar personalizada */
        .assinatura-container::-webkit-scrollbar {
            width: 6px;
        }

        .assinatura-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 0 0 16px 16px;
        }

        .assinatura-container::-webkit-scrollbar-thumb {
            background: #1a237e;
            border-radius: 3px;
        }

        .assinatura-container::-webkit-scrollbar-thumb:hover {
            background: #0d47a1;
        }
    </style>
</head>
<body>
    <div class="assinatura-container" id="assinaturaContainer">
        <div class="assinatura-header">
            <h1>✍️ ASSINATURA</h1>
            <p>Assine no campo abaixo com o mouse ou dedo</p>
        </div>

        <div class="assinatura-body">
            <div class="assinatura-info">
                <div class="label" id="tipoAssinatura">ENTREGUE POR</div>
                <div class="nome" id="nomeSignatario">-</div>
                <div class="tipo" id="infoAdicional">S.A. Emergencial</div>
            </div>

            <div class="form-group">
                <label for="nomeInput">Nome do Signatário *</label>
                <input type="text" id="nomeInput" placeholder="Digite seu nome completo" autocomplete="off">
            </div>

            <div class="signature-area">
                <canvas id="signatureCanvas"></canvas>
            </div>

            <div class="assinatura-status" id="statusMessage"></div>

            <div class="signature-actions">
                <button class="btn-limpar" onclick="limparAssinatura()">🗑️ Limpar</button>
                <button class="btn-confirmar" onclick="confirmarAssinatura()">✅ Confirmar</button>
                <button class="btn-cancelar" onclick="cancelarAssinatura()">❌ Cancelar</button>
                <button class="btn-voltar" onclick="voltarSemAssinar()">⬅ Voltar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script>
        let signaturePad = null;
        let dadosAssinatura = null;

        // ============================================
        // INICIALIZAÇÃO
        // ============================================

        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const tipo = params.get('tipo') || 'entregue';
            const nome = params.get('nome') || '';
            const numero = params.get('numero') || '';

            dadosAssinatura = {
                tipo: tipo,
                nome: nome,
                numero: numero
            };

            const tipoLabel = tipo === 'entregue' ? '📤 ENTREGUE POR' : '📥 RECEBIDO POR';
            document.getElementById('tipoAssinatura').textContent = tipoLabel;
            document.getElementById('nomeSignatario').textContent = nome || 'Aguardando...';
            document.getElementById('nomeInput').value = nome || '';
            document.getElementById('infoAdicional').textContent = `S.A. Emergencial #${String(numero).padStart(4, '0')}`;

            const canvas = document.getElementById('signatureCanvas');
            const container = canvas.parentElement;
            
            const resizeCanvas = () => {
                const width = container.clientWidth - 4;
                const height = window.innerWidth <= 480 ? 160 : window.innerWidth <= 768 ? 200 : 250;
                canvas.width = width;
                canvas.height = height;
                canvas.style.width = width + 'px';
                canvas.style.height = height + 'px';
                
                if (signaturePad) {
                    signaturePad.resizeCanvas();
                }
            };

            signaturePad = new SignaturePad(canvas, {
                backgroundColor: 'rgba(255, 255, 255, 0)',
                penColor: '#1a237e',
                minWidth: 2,
                maxWidth: 4
            });

            resizeCanvas();
            signaturePad.resizeCanvas();

            window.addEventListener('resize', resizeCanvas);

            document.getElementById('nomeInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    confirmarAssinatura();
                }
            });
        });

        // ============================================
        // FUNÇÕES DE ASSINATURA
        // ============================================

        function limparAssinatura() {
            if (signaturePad) {
                signaturePad.clear();
            }
            document.getElementById('statusMessage').className = 'assinatura-status';
            document.getElementById('statusMessage').style.display = 'none';
        }

        function confirmarAssinatura() {
            const nome = document.getElementById('nomeInput').value.trim();
            
            if (!nome) {
                mostrarStatus('⚠️ Por favor, informe o nome do signatário.', 'error');
                return;
            }

            if (!signaturePad || signaturePad.isEmpty()) {
                mostrarStatus('⚠️ Por favor, assine no campo acima.', 'error');
                return;
            }

            const assinaturaData = signaturePad.toDataURL();

            const dados = {
                tipo: dadosAssinatura.tipo,
                nome: nome,
                assinatura: assinaturaData,
                numero: dadosAssinatura.numero
            };

            sessionStorage.setItem('assinatura_temp', JSON.stringify(dados));

            mostrarStatus('✅ Assinatura realizada com sucesso! Redirecionando...', 'success');

            setTimeout(() => {
                window.location.href = 'formulario.html?numero=' + dadosAssinatura.numero;
            }, 1500);
        }

        function cancelarAssinatura() {
            if (confirm('❌ Tem certeza que deseja cancelar a assinatura?')) {
                window.location.href = 'formulario.html?numero=' + dadosAssinatura.numero;
            }
        }

        function voltarSemAssinar() {
            if (confirm('⚠️ Você vai voltar sem assinar. Tem certeza?')) {
                window.location.href = 'formulario.html?numero=' + dadosAssinatura.numero;
            }
        }

        function mostrarStatus(mensagem, tipo) {
            const status = document.getElementById('statusMessage');
            status.textContent = mensagem;
            status.className = 'assinatura-status ' + tipo;
            status.style.display = 'block';
        }
    </script>
</body>
</html>
